events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    server {
        listen 443 ssl;
        # listen 80;
        server_name virtualmedic.ru;

        set $frontend_origin http://frontend:80;
        set $backend_origin http://backend:8000;

        client_body_timeout 30s;
        client_max_body_size 90m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        error_page 413 = @file_too_large;

        # данные для SSL сертификата для домена 'virtualmedic.ru'
        ssl_certificate /etc/letsencrypt/live/virtualmedic.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/virtualmedic.ru/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location @file_too_large {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8";
            return 413 '{"detail":"Upload size exceeds the allowed limit"}';
        }

        location = /health {
            proxy_pass $backend_origin/health;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass $backend_origin$request_uri;
        }

        location /docs {
            proxy_pass $backend_origin$request_uri;
        }

        location /redoc {
            proxy_pass $backend_origin$request_uri;
        }

        location = /openapi.json {
            proxy_pass $backend_origin/openapi.json;
        }

        location / {
            proxy_pass $frontend_origin$request_uri;
        }
    }

    # редирект с HTTP на HTTPS
    server {
        listen 80;
        server_name virtualmedic.ru;
        return 301 https://$host$request_uri;
    }
}
