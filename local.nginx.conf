events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    upstream backend_upstream {
        server backend:8000;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name virtualmedic.ru;

        client_body_timeout 30s;
        client_max_body_size 90m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        error_page 413 = @file_too_large;

        location @file_too_large {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8";
            return 413 '{"detail":"Upload size exceeds the allowed limit"}';
        }

        location = /health {
            proxy_pass http://backend_upstream/health;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_upstream;
        }

        location /docs {
            proxy_pass http://backend_upstream;
        }

        location /redoc {
            proxy_pass http://backend_upstream;
        }

        location = /openapi.json {
            proxy_pass http://backend_upstream/openapi.json;
        }

        location / {
            proxy_pass http://frontend_upstream;
        }
    }
}
