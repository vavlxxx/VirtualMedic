<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/virtualmedic-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VirtualMedic</title>
    <style>
      #app-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #app-preloader.preloader-hidden {
        opacity: 0;
        visibility: hidden;
      }
      .preloader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.5rem;
      }
      .preloader-logo-container {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .preloader-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        z-index: 2;
        filter: drop-shadow(0 4px 12px rgba(26, 59, 142, 0.3));
      }
      .preloader-pulse {
        position: absolute;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(26, 59, 142, 0.4);
        animation: preloaderPulse 2s infinite ease-in-out;
        z-index: 1;
      }
      .preloader-spinner-container {
        width: 40px;
        height: 40px;
      }
      .preloader-spinner {
        animation: rotate 1.8s linear infinite;
        width: 100%;
        height: 100%;
      }
      .preloader-spinner .path {
        stroke: #10b981;
        stroke-linecap: round;
        animation: dash 1.5s ease-in-out infinite;
      }
      .preloader-text-container {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .preloader-title {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.025em;
      }
      .preloader-subtitle {
        margin: 0;
        font-size: 0.875rem;
        color: #94a3b8;
        font-weight: 500;
      }
      .dots span {
        animation: dots 1.4s infinite both;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes preloaderPulse {
        0% {
          transform: scale(0.9);
          opacity: 0.8;
          box-shadow: 0 0 0 0 rgba(26, 59, 142, 0.4);
        }
        70% {
          transform: scale(1.3);
          opacity: 0;
          box-shadow: 0 0 0 15px rgba(26, 59, 142, 0);
        }
        100% {
          transform: scale(0.9);
          opacity: 0;
          box-shadow: 0 0 0 0 rgba(26, 59, 142, 0);
        }
      }
      @keyframes rotate {
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes dash {
        0% {
          stroke-dasharray: 1, 150;
          stroke-dashoffset: 0;
        }
        50% {
          stroke-dasharray: 90, 150;
          stroke-dashoffset: -35;
        }
        100% {
          stroke-dasharray: 90, 150;
          stroke-dashoffset: -124;
        }
      }
      @keyframes dots {
        0% { opacity: .2; }
        20% { opacity: 1; }
        100% { opacity: .2; }
      }
    </style>
    <script>
      (function() {
        var loaderDeps = {
          windowLoad: false,
          authReady: false
        };
        window.__resolvePreloader = function(dep) {
          loaderDeps[dep] = true;
          if (loaderDeps.windowLoad && loaderDeps.authReady) {
            var preloader = document.getElementById('app-preloader');
            if (preloader && !preloader.classList.contains('preloader-hidden')) {
              preloader.classList.add('preloader-hidden');
              setTimeout(function() {
                if (preloader.parentNode) {
                  preloader.parentNode.removeChild(preloader);
                }
              }, 500);
            }
          }
        };
        window.addEventListener('load', function() {
          window.__resolvePreloader('windowLoad');
        });
        // Safety timeout to prevent infinite loading screen (5 seconds)
        setTimeout(function() {
          window.__resolvePreloader('windowLoad');
          window.__resolvePreloader('authReady');
        }, 5000);
      })();
    </script>
  </head>
  <body>
    <div id="app-preloader">
      <div class="preloader-content">
        <div class="preloader-logo-container">
          <img src="/src/assets/virtualmedic-icon.png" alt="VirtualMedic" class="preloader-logo" />
          <div class="preloader-pulse"></div>
        </div>
        <div class="preloader-spinner-container">
          <svg class="preloader-spinner" viewBox="0 0 50 50">
            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
          </svg>
        </div>
        <div class="preloader-text-container">
          <h1 class="preloader-title">VirtualMedic</h1>
          <p class="preloader-subtitle">Подготовка безопасного соединения<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
