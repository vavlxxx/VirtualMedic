<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b7cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                        "navy": {
                            "900": "#111418",
                            "800": "#1a212c",
                            "700": "#2c3645",
                            "600": "#4a5a71",
                            "500": "#617289",
                            "100": "#f0f2f4",
                        }
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .form-input:focus {
            border-color: #2b7cee !important;
            box-shadow: 0 0 0 1px #2b7cee !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-navy-900">
<div class="relative flex min-h-screen w-full flex-col bg-white dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation/Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-navy-100 dark:border-navy-800 px-6 md:px-40 py-4 bg-white dark:bg-background-dark">
<div class="flex items-center gap-3 text-navy-900 dark:text-slate-100">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">medical_services</span>
</div>
<h2 class="text-navy-900 dark:text-slate-100 text-xl font-extrabold leading-tight tracking-tight">VirtualMedic</h2>
</div>
<div class="flex items-center gap-4">
<a class="text-sm font-semibold text-navy-600 dark:text-navy-500 hover:text-primary transition-colors" href="#">Помощь</a>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 md:p-12">
<div class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Title Section -->
<div class="flex flex-col gap-2">
<h1 class="text-navy-900 dark:text-slate-100 text-3xl font-black leading-tight tracking-[-0.033em]">Регистрация</h1>
<p class="text-navy-500 dark:text-navy-600 text-base font-normal">Создайте аккаунт, чтобы пользоваться услугами VirtualMedic</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-5" onsubmit="return false;">
<div class="flex flex-col gap-1.5">
<label class="text-navy-900 dark:text-slate-200 text-sm font-semibold leading-normal">Имя</label>
<input class="form-input flex w-full rounded-lg text-navy-900 dark:text-slate-100 border border-navy-100 dark:border-navy-800 bg-white dark:bg-navy-900 h-14 placeholder:text-navy-500 p-4 text-base font-normal leading-normal focus:outline-none transition-all" placeholder="Имя" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-navy-900 dark:text-slate-200 text-sm font-semibold leading-normal">Фамилия</label>
<input class="form-input flex w-full rounded-lg text-navy-900 dark:text-slate-100 border border-navy-100 dark:border-navy-800 bg-white dark:bg-navy-900 h-14 placeholder:text-navy-500 p-4 text-base font-normal leading-normal focus:outline-none transition-all" placeholder="Фамилия" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-navy-900 dark:text-slate-200 text-sm font-semibold leading-normal">Логин</label>
<input class="form-input flex w-full rounded-lg text-navy-900 dark:text-slate-100 border border-navy-100 dark:border-navy-800 bg-white dark:bg-navy-900 h-14 placeholder:text-navy-500 p-4 text-base font-normal leading-normal focus:outline-none transition-all" placeholder="Ваш логин" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-navy-900 dark:text-slate-200 text-sm font-semibold leading-normal">Пароль</label>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-navy-900 dark:text-slate-100 border border-navy-100 dark:border-navy-800 bg-white dark:bg-navy-900 h-14 placeholder:text-navy-500 p-4 text-base font-normal leading-normal focus:outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-navy-500" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-navy-900 dark:text-slate-200 text-sm font-semibold leading-normal">Подтверждение пароля</label>
<input class="form-input flex w-full rounded-lg text-navy-900 dark:text-slate-100 border border-navy-100 dark:border-navy-800 bg-white dark:bg-navy-900 h-14 placeholder:text-navy-500 p-4 text-base font-normal leading-normal focus:outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-start gap-3 py-2">
<input class="mt-1 size-5 rounded border-navy-100 text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-sm text-navy-600 dark:text-navy-500 leading-snug" for="terms">
                                Я соглашаюсь с <a class="text-primary font-medium hover:underline" href="#">Условиями использования</a> и <a class="text-primary font-medium hover:underline" href="#">Политикой конфиденциальности</a>
</label>
</div>
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                            Зарегистрироваться
                        </button>
</form>
<!-- Bottom Link -->
<div class="flex flex-col items-center gap-4 border-t border-navy-100 dark:border-navy-800 pt-6">
<p class="text-navy-600 dark:text-navy-500 text-base">
                            Уже есть аккаунт?
                            <a class="text-primary font-bold hover:underline ml-1" href="#">Войти</a>
</p>
</div>
</div>
</main>
<!-- Footer Small -->
<footer class="px-6 md:px-40 py-8 text-center border-t border-navy-100 dark:border-navy-800">
<p class="text-navy-500 text-sm font-normal">© 2024 VirtualMedic. Все права защищены.</p>
</footer>
</div>
</div>
</body></html>
