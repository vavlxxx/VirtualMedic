services:
  postgres:
    container_name: virtualmedic_postgres
    image: postgres:17-alpine
    env_file:
      - ./backend/.env.postgres
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - virtualmedic_network

  backend:
    container_name: virtualmedic_backend
    build:
      context: ./backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - virtualmedic_network

  frontend:
    container_name: virtualmedic_frontend
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - virtualmedic_network

  nginx:
    container_name: virtualmedic_nginx.prod
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    restart: unless-stopped
    networks:
      - virtualmedic_network

volumes:
  postgres_data:

networks:
  virtualmedic_network:
    driver: bridge
